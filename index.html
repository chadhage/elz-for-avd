<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AVD on GCC High &mdash; Enterprise-Scale Landing Zone Assessment Workshop</title>
  <meta name="description" content="Guided L400 workshop for completing an Azure Enterprise-Scale Landing Zone Assessment for an Azure Virtual Desktop workload on GCC High (Azure Government) with multi-tenant considerations." />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
</head>
<body data-theme="light">
  <!-- ===================== TOP BAR ===================== -->
  <header class="topbar">
    <div class="topbar__brand">
      <div class="topbar__logo" aria-hidden="true">
        <img src="Azure-Virtual-Desktop.png" width="32" height="32" alt="Azure Virtual Desktop" />
      </div>
      <div class="topbar__titles">
        <h1>AVD - Enterprise Scale Landing Zone</h1>
        <p>Current State --&gt; Well Architected --&gt; Target State</p>
      </div>
    </div>

    <div class="topbar__actions">
      <div class="engagement">
        <input id="engagementName" type="text" placeholder="Engagement / Customer name" aria-label="Engagement name" />
      </div>
      <button id="btnNew" class="btn btn--ghost" title="Start a new workshop">New</button>
      <button id="btnSave" class="btn btn--ghost" title="Save a named copy in this browser">Save</button>
      <button id="btnOpen" class="btn btn--ghost" title="Open a previously saved workshop">Open</button>
      <button id="btnImport" class="btn btn--ghost" title="Load a saved assessment JSON">Import</button>
      <button id="btnExport" class="btn btn--primary" title="Download the assessment as JSON">Export JSON</button>
      <button id="btnTheme" class="btn btn--icon" title="Toggle light / dark" aria-label="Toggle theme">◐</button>
      <input id="importFile" type="file" accept="application/json" hidden />
    </div>
  </header>

  <!-- ===================== SAVED WORKSHOPS ===================== -->
  <div id="libraryPanel" class="library" hidden>
    <div class="library__head">
      <span class="library__title">Saved workshops</span>
      <button id="libraryClose" class="btn btn--icon" aria-label="Close saved workshops">✕</button>
    </div>
    <div id="libraryList" class="library__list"></div>
  </div>

  <!-- ===================== PROGRESS ===================== -->
  <div class="progress">
    <div class="progress__bar"><span id="progressFill" class="progress__fill"></span></div>
    <span id="progressLabel" class="progress__label">0% complete</span>
  </div>

  <!-- ===================== LAYOUT ===================== -->
  <div class="layout">
    <!-- Sidebar / module rail -->
    <nav class="rail" id="rail" aria-label="Workshop modules"></nav>

    <!-- Main workspace -->
    <main class="workspace" id="workspace">
      <section class="module" id="moduleView" aria-live="polite"><!-- rendered by app.js --></section>

      <div class="module-nav">
        <button id="btnPrev" class="btn btn--ghost">&larr; Previous</button>
        <div class="module-nav__meta"><span id="moduleTimer">30 min</span> module</div>
        <button id="btnNext" class="btn btn--primary">Next &rarr;</button>
      </div>
    </main>

    <!-- Reference dock (keeps sources in-context, no tab-switching) -->
    <aside class="dock" id="dock" aria-label="Reference sources">
      <div class="dock__head">
        <h3>Authoritative Sources</h3>
        <button id="btnDockToggle" class="btn btn--icon" aria-label="Collapse references">⇥</button>
      </div>
      <div class="dock__body" id="dockBody"></div>
    </aside>
  </div>

  <!-- ===================== TOASTS ===================== -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="data/modules.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
